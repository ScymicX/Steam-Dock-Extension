name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build Store bundle
        shell: pwsh
        run: ./Publishing/Build-StorePackage.ps1

      - name: Run local library diagnostics
        shell: pwsh
        run: dotnet run --project SteamDockExtension.Diagnostics --configuration Release

      - uses: actions/upload-artifact@v4
        with:
          name: SteamDockExtension-store
          path: artifacts/store/*.msixbundle
          if-no-files-found: error
