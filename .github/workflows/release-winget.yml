name: Release WinGet installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without a leading v, for example 0.1.0
        required: true
        default: 0.1.0
        type: string
      release_notes:
        description: Release notes
        required: true
        default: Initial public release.
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build x64 and ARM64 installers
        shell: pwsh
        run: ./Publishing/Build-WinGetInstallers.ps1 -Version '${{ inputs.version }}'

      - name: Create checksums
        shell: pwsh
        run: |
          Get-ChildItem artifacts/winget/installers/*.exe |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content artifacts/winget/installers/SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Steam Dock Extension v${{ inputs.version }}
          body: |
            ${{ inputs.release_notes }}

            Download the installer matching your Windows architecture.
            After installation, reload Command Palette extensions.
          files: |
            artifacts/winget/installers/*.exe
            artifacts/winget/installers/SHA256SUMS.txt
          fail_on_unmatched_files: true
